<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CatÃ¡logo â Encomendas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a;
    --surface: #1a1713;
    --surface2: #242018;
    --border: #2e2820;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --cream: #f5efe6;
    --muted: #7a6e62;
    --text: #ede8e0;
    --danger: #c94c4c;
    --green: #4cad7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    font-size: 15px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); letter-spacing: 0.03em; cursor: pointer; }
  .logo span { font-style: italic; color: var(--cream); }

  .cart-btn {
    background: var(--gold);
    color: #0e0c0a;
    border: none;
    border-radius: 50px;
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
  }
  .cart-btn:hover { background: var(--gold-light); }

  .cart-count {
    background: #0e0c0a;
    color: var(--gold);
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* HOME PAGE */
  .hero {
    padding: 32px 20px 20px;
    text-align: center;
    background: radial-gradient(ellipse at 50% 0%, #2a2118 0%, transparent 70%);
  }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--cream); line-height: 1.2; margin-bottom: 8px; }
  .hero p { color: var(--muted); font-size: 13px; font-weight: 300; }
  .gold-line { width: 40px; height: 2px; background: var(--gold); margin: 14px auto; }

  .filters {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .chip.active, .chip:hover { background: var(--gold); border-color: var(--gold); color: #0e0c0a; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 16px 120px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--gold); }

  /* Card indisponÃ­vel: sem hover */
  .card.sold-out { cursor: default; }
  .card.sold-out:hover { transform: none; border-color: var(--border); }

  .card-img {
    aspect-ratio: 3/4;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    position: relative;
    overflow: hidden;
  }
  .card-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center; }
  .card-img .emoji-fallback { position: relative; z-index: 1; }
  .card-img::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(to top, var(--surface), transparent);
  }

  /* GRAYSCALE para cards totalmente indisponÃ­veis */
  .card.sold-out .card-img img,
  .card.sold-out .card-img .emoji-fallback {
    filter: grayscale(100%);
    opacity: 0.55;
  }

  /* MARCA D'ÃGUA "INDISPONÃVEL" */
  .sold-out-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    pointer-events: none;
  }
  .sold-out-overlay span {
    background: rgba(14, 12, 10, 0.55);
    color: rgba(245, 239, 230, 0.85);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1.5px solid rgba(245, 239, 230, 0.35);
    border-radius: 4px;
    transform: rotate(-30deg);
    backdrop-filter: blur(2px);
    white-space: nowrap;
  }

  .badge {
    position: absolute;
    top: 8px; left: 8px;
    background: var(--gold);
    color: #0e0c0a;
    font-size: 9px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 50px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    z-index: 2;
  }

  .card-colors {
    position: absolute;
    bottom: 10px;
    right: 8px;
    display: flex;
    gap: 4px;
    z-index: 2;
  }
  .card-color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
    display: block;
  }

  .card-info { padding: 12px; }
  .card-name { font-size: 13px; font-weight: 500; color: var(--cream); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-sub { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .card-price { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--gold); }

  /* PreÃ§o muted quando indisponÃ­vel */
  .card.sold-out .card-price { color: var(--muted); }

  /* PRODUCT PAGE */
  .product-page { background: var(--bg); min-height: 100vh; padding-bottom: 120px; }

  /* CAROUSEL */
  .carousel {
    position: relative;
    width: 100%;
    aspect-ratio: 3/4;
    background: var(--surface2);
    overflow: hidden;
  }

  .carousel-track {
    display: flex;
    height: 100%;
    transition: transform 0.35s cubic-bezier(.32,.82,.32,1);
  }

  .carousel-slide {
    min-width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    position: relative;
    overflow: hidden;
  }

  .carousel-slide img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .carousel-slide .emoji-fallback { position: relative; z-index: 1; }

  .carousel-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(14,12,10,0.6);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    backdrop-filter: blur(4px);
  }
  .carousel-btn:hover { background: rgba(201,168,76,0.2); }
  .carousel-btn.prev { left: 10px; }
  .carousel-btn.next { right: 10px; }
  .carousel-btn.hidden { display: none; }

  .carousel-dots {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 10;
  }

  .carousel-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.2s;
  }
  .carousel-dot.active { background: var(--gold); width: 18px; border-radius: 3px; }

  /* BACK BUTTON */
  .back-bar {
    display: flex;
    align-items: center;
    padding: 14px 16px 0;
  }

  .back-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 50px;
    padding: 7px 14px 7px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--gold); color: var(--gold); }

  .product-body { padding: 20px; }
  .product-cat { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .product-title { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--cream); margin-bottom: 4px; }
  .product-price { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--gold); margin-bottom: 16px; }
  .product-desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }

  .section-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--cream);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label .selected-label {
    font-size: 12px;
    color: var(--gold);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }

  /* COLOR SWATCHES */
  .colors { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }

  .color-option {
    position: relative;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .color-swatch {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: all 0.15s;
    position: relative;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }

  .color-option input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }

  .color-option input[type="radio"]:checked + .color-swatch {
    border-color: var(--gold);
    transform: scale(1.15);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.25), 0 2px 6px rgba(0,0,0,0.4);
  }

  .color-option input[type="radio"]:checked + .color-swatch::after {
    content: 'â';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }

  .color-name {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    max-width: 40px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .color-option input[type="radio"]:checked ~ .color-name { color: var(--gold); }

  /* SIZES */
  .sizes { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }

  .size-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 44px;
    height: 44px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .size-btn:hover { border-color: var(--gold); color: var(--gold); }
  .size-btn.selected { background: var(--gold); border-color: var(--gold); color: #0e0c0a; font-weight: 700; }
  .size-btn.unavailable { opacity: 0.3; cursor: not-allowed; }

  .qty-row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .qty-label { font-size: 12px; font-weight: 500; color: var(--cream); text-transform: uppercase; letter-spacing: 0.06em; }

  .qty-ctrl {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .qty-ctrl button { background: none; border: none; color: var(--gold); width: 40px; height: 40px; font-size: 18px; cursor: pointer; transition: background 0.15s; }
  .qty-ctrl button:hover { background: var(--border); }
  .qty-val { width: 36px; text-align: center; font-size: 15px; font-weight: 500; color: var(--cream); }

  .validation-hint { font-size: 11px; color: var(--danger); margin-bottom: 8px; min-height: 16px; }

  .add-btn {
    width: 100%;
    background: var(--gold);
    color: #0e0c0a;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.2s;
  }
  .add-btn:hover { background: var(--gold-light); }
  .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* CART DRAWER */
  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .cart-overlay.open { opacity: 1; pointer-events: all; }

  .cart-drawer {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(.32,.82,.32,1);
    padding-bottom: 32px;
  }
  .cart-overlay.open .cart-drawer { transform: translateY(0); }

  .cart-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
  .cart-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--cream); }
  .close-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .cart-items { padding: 16px 20px; }
  .cart-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .cart-item-img { width: 56px; height: 56px; background: var(--surface2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; position: relative; overflow: hidden; }
  .cart-item-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 13px; font-weight: 500; color: var(--cream); }
  .cart-item-meta { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .cart-item-color-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0; }
  .cart-item-price { font-size: 13px; color: var(--gold); font-family: 'Playfair Display', serif; margin-top: 3px; }
  .cart-item-remove { background: none; border: none; color: var(--danger); font-size: 18px; cursor: pointer; padding: 4px; }

  .cart-empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .cart-empty span { font-size: 48px; display: block; margin-bottom: 12px; }

  .cart-footer { padding: 16px 20px 0; }
  .cart-total-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-top: 1px solid var(--border); margin-bottom: 16px; }
  .cart-total-label { font-size: 14px; color: var(--muted); }
  .cart-total-val { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); }

  .form-section { padding: 0 20px; }
  .form-title { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 12px; }

  .input-field {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--cream);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
    outline: none;
  }
  .input-field:focus { border-color: var(--gold); }
  .input-field::placeholder { color: var(--muted); }
  textarea.input-field { min-height: 72px; resize: none; }

  .whatsapp-btn {
    width: 100%;
    background: #25d366;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .whatsapp-btn:hover { background: #1ebe5d; }
  .whatsapp-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: #fff;
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (min-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); } }
</style>
</head>
<body>

<header>

<!-- HOME PAGE -->

        <input class="input-field" id="clientPhone" placeholder="Seu WhatsApp (11) 99999-9999" type="tel">

// ---------- SCROLL RESTORE ----------
// Salva a posiÃ§Ã£o do scroll antes de ir pro produto
function saveScrollPosition() {
  sessionStorage.setItem('catalogScrollY', window.scrollY);
}

// Restaura a posiÃ§Ã£o salva ao voltar pro catÃ¡logo
function restoreScrollPosition() {
  const saved = sessionStorage.getItem('catalogScrollY');
  if (saved !== null) {
    // Usa requestAnimationFrame para garantir que o DOM jÃ¡ renderizou
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        window.scrollTo(0, parseInt(saved, 10));
      });
    });
    sessionStorage.removeItem('catalogScrollY');
  }
}

// ---------- HELPERS ----------
function formatPrice(p) {
  return "R$ " + p.toFixed(2).replace(".", ",");
}

function getImages(p) {
  if (!p.img) return [];
  return Array.isArray(p.img) ? p.img : [p.img];
}

function firstImg(p) {
  const imgs = getImages(p);
  return imgs[0] || null;
}

function swatchStyle(hex) {
  if (!hex) return 'background:#888';
  if (hex.includes('/')) {
    const [c1, c2] = hex.split('/');
    return `background: linear-gradient(135deg, ${c1} 50%, ${c2} 50%)`;
  }
  return `background: ${hex}`;
}

function categoryLabel(cat) {
  const map = { feminino: "Feminino", masculino: "Masculino" };
  return map[cat] || cat;
}

// Verifica se TODOS os tamanhos estÃ£o indisponÃ­veis
function isFullySoldOut(p) {
  if (!p.sizes || p.sizes.length === 0) return false;
  return p.sizes.every(s => p.unavailable.includes(s));
}

// ---- PAGES ----
function goHome() {
  document.getElementById("homePage").classList.add("active");
  document.getElementById("productPage").classList.remove("active");
  restoreScrollPosition();
}

function goProduct() {
  document.getElementById("homePage").classList.remove("active");
  document.getElementById("productPage").classList.add("active");
  window.scrollTo(0, 0);
}

// ---- GRID ----
function renderGrid(filter) {
  const grid = document.getElementById("productGrid");
  const filtered = filter === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === filter);
  grid.innerHTML = filtered.map(p => {
    const soldOut = isFullySoldOut(p);
    const colorDots = (p.colors || []).slice(0, 4).map(c =>
      `<span class="card-color-dot" style="${swatchStyle(c.hex)}" title="${c.name}"></span>`
    ).join('');
    const img = firstImg(p);
    const imgHtml = img
      ? `<img src="${img}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="emoji-fallback" style="display:none">${p.emoji}</span>`
      : `<span class="emoji-fallback">${p.emoji}</span>`;

    // Overlay de marca d'Ã¡gua apenas quando totalmente indisponÃ­vel
    const soldOutOverlay = soldOut
      ? `<div class="sold-out-overlay"><span>IndisponÃ­vel</span></div>`
      : '';

    // Card clicÃ¡vel sÃ³ se nÃ£o estiver totalmente indisponÃ­vel
    const clickHandler = soldOut ? '' : `onclick="openProduct(${p.id})"`;

    return `
    <div class="card${soldOut ? ' sold-out' : ''}" ${clickHandler}>
      <div class="card-img">
        ${p.badge && !soldOut ? `<div class="badge">${p.badge}</div>` : ""}
        ${imgHtml}
        ${soldOutOverlay}
        ${colorDots && !soldOut ? `<div class="card-colors">${colorDots}</div>` : ""}
      </div>
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-sub">${categoryLabel(p.category)}</div>
        <div class="card-price">${soldOut ? 'IndisponÃ­vel' : formatPrice(p.price)}</div>
      </div>
    </div>`;
  }).join("");
}

function filterCat(cat, el) {
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  renderGrid(cat);
}

// ---- CAROUSEL ----
function buildCarousel(p) {
  carouselImages = getImages(p);
  carouselIndex = 0;
  const track = document.getElementById("carouselTrack");
  const dots = document.getElementById("carouselDots");

  track.innerHTML = carouselImages.length > 0
    ? carouselImages.map((src, i) => `
        <div class="carousel-slide">
          <img src="${src}" alt="${p.name} foto ${i+1}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <span class="emoji-fallback" style="display:none">${p.emoji}</span>
        </div>`).join("")
    : `<div class="carousel-slide"><span class="emoji-fallback">${p.emoji}</span></div>`;

  dots.innerHTML = carouselImages.length > 1
    ? carouselImages.map((_, i) => `<div class="carousel-dot ${i===0?'active':''}" onclick="carouselGo(${i})"></div>`).join("")
    : "";

  updateCarouselUI();
}

function updateCarouselUI() {
  const track = document.getElementById("carouselTrack");
  track.style.transform = `translateX(-${carouselIndex * 100}%)`;
  document.querySelectorAll(".carousel-dot").forEach((d, i) => {
    d.classList.toggle("active", i === carouselIndex);
  });
  const prev = document.getElementById("carouselPrev");
  const next = document.getElementById("carouselNext");
  const total = carouselImages.length;
  prev.classList.toggle("hidden", total <= 1 || carouselIndex === 0);
  next.classList.toggle("hidden", total <= 1 || carouselIndex === total - 1);
}

function carouselMove(dir) {
  carouselIndex = Math.max(0, Math.min(carouselImages.length - 1, carouselIndex + dir));
  updateCarouselUI();
}

function carouselGo(i) {
  carouselIndex = i;
  updateCarouselUI();
}

// touch swipe on carousel
(function() {
  let startX = 0;
  document.getElementById("carousel").addEventListener("touchstart", e => { startX = e.touches[0].clientX; }, { passive: true });
  document.getElementById("carousel").addEventListener("touchend", e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) carouselMove(diff > 0 ? 1 : -1);
  });
})();

// ---- PRODUCT PAGE ----
function openProduct(id) {
  // Salva posiÃ§Ã£o do scroll ANTES de trocar de pÃ¡gina
  saveScrollPosition();

  const p = PRODUCTS.find(x => x.id === id);
  currentProduct = p;
  selectedColor = null;
  selectedSize = null;
  qty = 1;

  document.getElementById("qtyVal").textContent = 1;
  document.getElementById("validationHint").textContent = "";
  document.getElementById("colorSelectedLabel").textContent = "";
  document.getElementById("productCat").textContent = categoryLabel(p.category);
  document.getElementById("productTitle").textContent = p.name;
  document.getElementById("productPrice").textContent = formatPrice(p.price);
  document.getElementById("productDesc").textContent = p.desc;

  buildCarousel(p);

  // Colors
  const colorsEl = document.getElementById("productColors");
  const colorSection = document.getElementById("colorLabel");
  if (p.colors && p.colors.length > 0) {
    colorSection.style.display = "flex";
    colorsEl.style.display = "flex";
    colorsEl.innerHTML = p.colors.map((c, i) => `
      <label class="color-option" title="${c.name}">
        <input type="radio" name="colorSelect" value="${i}" onchange="selectColor(${i})">
        <div class="color-swatch" style="${swatchStyle(c.hex)}"></div>
        <span class="color-name">${c.name}</span>
      </label>`).join("");
  } else {
    colorSection.style.display = "none";
    colorsEl.style.display = "none";
    selectedColor = { name: "PadrÃ£o", hex: "#888" };
  }

  // Sizes
  document.getElementById("productSizes").innerHTML = p.sizes.map(s => {
    const unavail = p.unavailable.includes(s);
    return `<button class="size-btn ${unavail ? "unavailable" : ""}" onclick="${unavail ? "" : `selectSize('${s}', this)`}">${s}</button>`;
  }).join("");

  document.getElementById("addBtn").disabled = true;
  goProduct();
}

function selectColor(idx) {
  selectedColor = currentProduct.colors[idx];
  document.getElementById("colorSelectedLabel").textContent = "â " + selectedColor.name;
  checkAddBtn();
}

function selectSize(s, el) {
  selectedSize = s;
  document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("selected"));
  el.classList.add("selected");
  checkAddBtn();
}

function checkAddBtn() {
  const needsColor = currentProduct.colors && currentProduct.colors.length > 0;
  const colorOk = !needsColor || selectedColor;
  const sizeOk = !!selectedSize;
  document.getElementById("addBtn").disabled = !(colorOk && sizeOk);
  let hint = "";
  if (!colorOk && !sizeOk) hint = "Selecione cor e tamanho";
  else if (!colorOk) hint = "Selecione uma cor";
  else if (!sizeOk) hint = "Selecione um tamanho";
  document.getElementById("validationHint").textContent = hint;
}

function changeQty(d) {
  qty = Math.max(1, qty + d);
  document.getElementById("qtyVal").textContent = qty;
}

function addToCart() {
  const needsColor = currentProduct.colors && currentProduct.colors.length > 0;
  if (needsColor && !selectedColor) return;
  if (!selectedSize) return;

  const colorKey = selectedColor ? selectedColor.name : "PadrÃ£o";
  const existing = cart.find(i => i.id === currentProduct.id && i.size === selectedSize && i.colorName === colorKey);
  if (existing) {
    existing.qty += qty;
  } else {
    cart.push({ ...currentProduct, size: selectedSize, colorName: colorKey, colorHex: selectedColor ? selectedColor.hex : null, qty });
  }
  updateCartCount();
  showToast("â Adicionado Ã  sacola!");
  goHome();
}

function updateCartCount() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById("cartCount").textContent = total;
}

// ---- CART ----
function openCart() {
  renderCart();
  document.getElementById("cartOverlay").classList.add("open");
}

function closeCart() {
  document.getElementById("cartOverlay").classList.remove("open");
}

function renderCart() {
  const el = document.getElementById("cartItems");
  const footer = document.getElementById("cartFooter");
  if (cart.length === 0) {
    el.innerHTML = `<div class="cart-empty"><span>ðï¸</span>Sua sacola estÃ¡ vazia.<br>Adicione peÃ§as para pedir!</div>`;
    footer.style.display = "none";
    return;
  }
  footer.style.display = "block";
  el.innerHTML = cart.map((item, idx) => {
    const img = firstImg(item);
    const imgHtml = img
      ? `<img src="${img}" alt="${item.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="emoji-fallback" style="display:none">${item.emoji}</span>`
      : `<span class="emoji-fallback">${item.emoji}</span>`;
    const dotStyle = item.colorHex ? `style="${swatchStyle(item.colorHex)}"` : '';
    return `
    <div class="cart-item">
      <div class="cart-item-img">${imgHtml}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-meta">
          ${item.colorHex ? `<span class="cart-item-color-dot" ${dotStyle}></span>` : ""}
          <span>${item.colorName}</span>
          <span>Â·</span><span>Tam. ${item.size}</span>
          <span>Â·</span><span>Qtd: ${item.qty}</span>
        </div>
        <div class="cart-item-price">${formatPrice(item.price * item.qty)}</div>
      </div>
      <button class="cart-item-remove" onclick="removeItem(${idx})">ðï¸</button>
    </div>`;
  }).join("");
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById("cartTotal").textContent = formatPrice(total);
}

function removeItem(idx) {
  cart.splice(idx, 1);
  updateCartCount();
  renderCart();
}

function handleOverlayClick(e, id) {

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
