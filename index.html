<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Catálogo — Encomendas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a;
    --surface: #1a1713;
    --surface2: #242018;
    --border: #2e2820;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --cream: #f5efe6;
    --muted: #7a6e62;
    --text: #ede8e0;
    --danger: #c94c4c;
    --green: #4cad7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    font-size: 15px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); letter-spacing: 0.03em; }
  .logo span { font-style: italic; color: var(--cream); }

  .cart-btn {
    background: var(--gold);
    color: #0e0c0a;
    border: none;
    border-radius: 50px;
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
  }
  .cart-btn:hover { background: var(--gold-light); }

  .cart-count {
    background: #0e0c0a;
    color: var(--gold);
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  .hero {
    padding: 32px 20px 20px;
    text-align: center;
    background: radial-gradient(ellipse at 50% 0%, #2a2118 0%, transparent 70%);
  }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--cream); line-height: 1.2; margin-bottom: 8px; }
  .hero p { color: var(--muted); font-size: 13px; font-weight: 300; }
  .gold-line { width: 40px; height: 2px; background: var(--gold); margin: 14px auto; }

  .filters {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .chip.active, .chip:hover { background: var(--gold); border-color: var(--gold); color: #0e0c0a; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 16px 120px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--gold); }

  .card-img {
    aspect-ratio: 3/4;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    position: relative;
    overflow: hidden;
  }
  .card-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center; }
  .card-img .emoji-fallback { position: relative; z-index: 1; }
  .card-img::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(to top, var(--surface), transparent);
  }

  .badge {
    position: absolute;
    top: 8px; left: 8px;
    background: var(--gold);
    color: #0e0c0a;
    font-size: 9px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 50px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    z-index: 2;
  }

  /* Mini color dots on card */
  .card-colors {
    position: absolute;
    bottom: 10px;
    right: 8px;
    display: flex;
    gap: 4px;
    z-index: 2;
  }
  .card-color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
    display: block;
  }

  .card-info { padding: 12px; }
  .card-name { font-size: 13px; font-weight: 500; color: var(--cream); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-sub { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .card-price { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--gold); }

  /* MODAL */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(.32,.82,.32,1);
    padding-bottom: 32px;
  }
  .overlay.open .modal { transform: translateY(0); }

  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }

  .modal-img {
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    margin-top: 12px;
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
  }
  .modal-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center; }
  .modal-img .emoji-fallback { position: relative; z-index: 1; }

  .modal-body { padding: 20px; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--cream); margin-bottom: 4px; }
  .modal-cat { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .modal-price { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--gold); margin-bottom: 20px; }
  .modal-desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }

  .section-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--cream);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label .selected-label {
    font-size: 12px;
    color: var(--gold);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }

  /* COLOR SWATCHES */
  .colors {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .color-option {
    position: relative;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .color-swatch {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: all 0.15s;
    position: relative;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }

  /* Multi-color swatch (gradient) rendered inline via style */

  .color-option input[type="radio"] {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
  }

  .color-option input[type="radio"]:checked + .color-swatch {
    border-color: var(--gold);
    transform: scale(1.15);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.25), 0 2px 6px rgba(0,0,0,0.4);
  }

  .color-option input[type="radio"]:checked + .color-swatch::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }

  .color-name {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    max-width: 40px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .color-option input[type="radio"]:checked ~ .color-name {
    color: var(--gold);
  }

  /* SIZES */
  .sizes { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }

  .size-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 44px;
    height: 44px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .size-btn:hover { border-color: var(--gold); color: var(--gold); }
  .size-btn.selected { background: var(--gold); border-color: var(--gold); color: #0e0c0a; font-weight: 700; }
  .size-btn.unavailable { opacity: 0.3; cursor: not-allowed; }

  .qty-row { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .qty-label { font-size: 12px; font-weight: 500; color: var(--cream); text-transform: uppercase; letter-spacing: 0.06em; }

  .qty-ctrl {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .qty-ctrl button { background: none; border: none; color: var(--gold); width: 40px; height: 40px; font-size: 18px; cursor: pointer; transition: background 0.15s; }
  .qty-ctrl button:hover { background: var(--border); }
  .qty-val { width: 36px; text-align: center; font-size: 15px; font-weight: 500; color: var(--cream); }

  .add-btn {
    width: 100%;
    background: var(--gold);
    color: #0e0c0a;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.2s;
  }
  .add-btn:hover { background: var(--gold-light); }
  .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* validation hint */
  .validation-hint {
    font-size: 11px;
    color: var(--danger);
    margin-bottom: 8px;
    min-height: 16px;
    transition: opacity 0.2s;
  }

  /* CART DRAWER */
  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .cart-overlay.open { opacity: 1; pointer-events: all; }

  .cart-drawer {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(.32,.82,.32,1);
    padding-bottom: 32px;
  }
  .cart-overlay.open .cart-drawer { transform: translateY(0); }

  .cart-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
  .cart-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--cream); }
  .close-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .cart-items { padding: 16px 20px; }

  .cart-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .cart-item-img { width: 56px; height: 56px; background: var(--surface2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; position: relative; overflow: hidden; }
  .cart-item-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 13px; font-weight: 500; color: var(--cream); }
  .cart-item-meta { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .cart-item-color-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0; }
  .cart-item-price { font-size: 13px; color: var(--gold); font-family: 'Playfair Display', serif; margin-top: 3px; }
  .cart-item-remove { background: none; border: none; color: var(--danger); font-size: 18px; cursor: pointer; padding: 4px; }

  .cart-empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .cart-empty span { font-size: 48px; display: block; margin-bottom: 12px; }

  .cart-footer { padding: 16px 20px 0; }
  .cart-total-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-top: 1px solid var(--border); margin-bottom: 16px; }
  .cart-total-label { font-size: 14px; color: var(--muted); }
  .cart-total-val { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); }

  .form-section { padding: 0 20px; }
  .form-title { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 12px; }

  .input-field {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--cream);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
    outline: none;
  }
  .input-field:focus { border-color: var(--gold); }
  .input-field::placeholder { color: var(--muted); }

  .whatsapp-btn {
    width: 100%;
    background: #25d366;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .whatsapp-btn:hover { background: #1ebe5d; }
  .whatsapp-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: #fff;
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  textarea.input-field { min-height: 72px; resize: none; }

  @media (min-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); } }
</style>
</head>
<body>

<header>
  <div class="logo">Fashion<span>Link</span></div>
  <button class="cart-btn" onclick="openCart()">
    🛍️ Sacola
    <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<div class="hero">
  <h1>Escolha sua peça<br>e faça seu pedido</h1>
  <div class="gold-line"></div>
  <p>Selecione modelo, cor, tamanho e quantidade — simples assim.</p>
</div>

<div class="filters" id="filters">
  <button class="chip active" onclick="filterCat('all', this)">Tudo</button>
  <button class="chip" onclick="filterCat('feminino', this)">Feminino</button>
  <button class="chip" onclick="filterCat('masculino', this)">Masculino</button>
  <button class="chip" onclick="filterCat('vestido', this)">Vestidos</button>
  <button class="chip" onclick="filterCat('casual', this)">Casual</button>
  <button class="chip" onclick="filterCat('plus', this)">Plus Size</button>
</div>

<div class="grid" id="productGrid"></div>

<!-- PRODUCT MODAL -->
<div class="overlay" id="productOverlay" onclick="handleOverlayClick(event, 'productOverlay')">
  <div class="modal" id="productModal">
    <div class="modal-handle"></div>
    <div class="modal-img" id="modalImg"></div>
    <div class="modal-body">
      <div class="modal-cat" id="modalCat"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-price" id="modalPrice"></div>
      <div class="modal-desc" id="modalDesc"></div>

      <!-- COR / MODELO -->
      <div class="section-label" id="colorLabel">
        Cor / Modelo
        <span class="selected-label" id="colorSelectedLabel"></span>
      </div>
      <div class="colors" id="modalColors"></div>

      <!-- TAMANHO -->
      <div class="section-label">Tamanho</div>
      <div class="sizes" id="modalSizes"></div>

      <div class="qty-row">
        <span class="qty-label">Quantidade</span>
        <div class="qty-ctrl">
          <button onclick="changeQty(-1)">−</button>
          <span class="qty-val" id="qtyVal">1</span>
          <button onclick="changeQty(1)">+</button>
        </div>
      </div>
      <div class="validation-hint" id="validationHint"></div>
      <button class="add-btn" id="addBtn" onclick="addToCart()">Adicionar à sacola</button>
    </div>
  </div>
</div>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cartOverlay" onclick="handleOverlayClick(event, 'cartOverlay')">
  <div class="cart-drawer">
    <div class="cart-header">
      <div class="cart-title">Minha Sacola 🛍️</div>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>

    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-total-row">
        <span class="cart-total-label">Total estimado</span>
        <span class="cart-total-val" id="cartTotal">R$ 0,00</span>
      </div>
      <div class="form-section">
        <div class="form-title">Seus dados para o pedido</div>
        <input class="input-field" id="clientName" placeholder="Seu nome completo" type="text">
        <input class="input-field" id="clientPhone" placeholder="Seu WhatsApp (11) 99999-9999" type="tel">
        <textarea class="input-field" id="clientObs" placeholder="Observações (opcional): prazo, dúvidas, etc."></textarea>
        <button class="whatsapp-btn" onclick="sendOrder()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Enviar pedido via WhatsApp
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">✓ Adicionado à sacola!</div>

<script>
// =====================
// CONFIGURAÇÃO — Edite aqui!
// =====================
const WHATSAPP_NUMBER = "5511953281826";

// Formato das cores:
// { name: "Nome da cor", hex: "#xxxxxx" }   → cor sólida
// { name: "Nome", hex: "#aaa/#bbb" }         → duas cores (gradiente)
// { name: "Nome", hex: "img:fotos/xxx.jpg" } → miniatura da imagem como swatch

const PRODUCTS = [
  {
    id: 1, name: "BabyTee Gola Alta", category: "feminino",
    price: 159.90, emoji: "👗",
    img: ["fotos/babytee.jpeg", "fotos/babytee2.jpeg"],
    desc: "Peça coringa para todas as estações. Tamanho único veste do 36 ao 40.",
    colors: [
      { name: "Preto", hex: "#1a1a1a" },
      { name: "Cinza", hex: "#808080" },
      { name: "Off-White", hex: "#e8dcc8" },
      { name: "Verde Escuro", hex: "#013220" },
      { name: "Rosa", hex: "#e8a0b0" },
      { name: "Chocolate", hex: "#D2691E" },
    ],
    sizes: ["Tamanho único"],
    unavailable: [],
    badge: "Novo"

// =====================
let cart = [];
let currentProduct = null;
let selectedColor = null;
let selectedSize = null;
let qty = 1;

function formatPrice(p) {
  return "R$ " + p.toFixed(2).replace(".", ",");
}

function imgTag(img, emoji, alt) {
  if (!img) return `<span class="emoji-fallback">${emoji}</span>`;
  return `<img src="${img}" alt="${alt}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="emoji-fallback" style="display:none">${emoji}</span>`;
}

function swatchStyle(hex) {
  if (!hex) return 'background:#888';
  if (hex.includes('/')) {
    const [c1, c2] = hex.split('/');
    return `background: linear-gradient(135deg, ${c1} 50%, ${c2} 50%)`;
  }
  return `background: ${hex}`;
}

function renderGrid(filter) {
  const grid = document.getElementById("productGrid");
  const filtered = filter === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === filter);
  grid.innerHTML = filtered.map(p => {
    const colorDots = (p.colors || []).slice(0, 4).map(c =>
      `<span class="card-color-dot" style="${swatchStyle(c.hex)}" title="${c.name}"></span>`
    ).join('');
    return `
    <div class="card" onclick="openProduct(${p.id})">
      <div class="card-img">
        ${p.badge ? `<div class="badge">${p.badge}</div>` : ""}
        ${imgTag(p.img, p.emoji, p.name)}
        ${colorDots ? `<div class="card-colors">${colorDots}</div>` : ""}
      </div>
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-sub">${categoryLabel(p.category)}</div>
        <div class="card-price">${formatPrice(p.price)}</div>
      </div>
    </div>`;
  }).join("");
}

function categoryLabel(cat) {
  const map = { feminino: "Feminino", masculino: "Masculino", vestido: "Vestido", casual: "Casual", plus: "Plus Size" };
  return map[cat] || cat;
}

function filterCat(cat, el) {
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  renderGrid(cat);
}

function openProduct(id) {
  const p = PRODUCTS.find(x => x.id === id);
  currentProduct = p;
  selectedColor = null;
  selectedSize = null;
  qty = 1;
  document.getElementById("qtyVal").textContent = 1;
  document.getElementById("validationHint").textContent = "";
  document.getElementById("modalImg").innerHTML = imgTag(p.img, p.emoji, p.name);
  document.getElementById("modalCat").textContent = categoryLabel(p.category);
  document.getElementById("modalTitle").textContent = p.name;
  document.getElementById("modalPrice").textContent = formatPrice(p.price);
  document.getElementById("modalDesc").textContent = p.desc;
  document.getElementById("colorSelectedLabel").textContent = "";

  // Render color swatches
  const colorsEl = document.getElementById("modalColors");
  const colorSection = document.getElementById("colorLabel");

  if (p.colors && p.colors.length > 0) {
    colorSection.style.display = "flex";
    colorsEl.style.display = "flex";
    colorsEl.innerHTML = p.colors.map((c, i) => `
      <label class="color-option" title="${c.name}">
        <input type="radio" name="colorSelect" value="${i}" onchange="selectColor(${i})">
        <div class="color-swatch" style="${swatchStyle(c.hex)}"></div>
        <span class="color-name">${c.name}</span>
      </label>
    `).join("");
  } else {
    colorSection.style.display = "none";
    colorsEl.style.display = "none";
    selectedColor = { name: "Padrão", hex: "#888" };
  }

  // Render size buttons
  document.getElementById("modalSizes").innerHTML = p.sizes.map(s => {
    const unavail = p.unavailable.includes(s);
    return `<button class="size-btn ${unavail ? "unavailable" : ""}" onclick="${unavail ? "" : `selectSize('${s}', this)`}">${s}</button>`;
  }).join("");

  document.getElementById("addBtn").disabled = true;
  document.getElementById("productOverlay").classList.add("open");
}

function selectColor(idx) {
  selectedColor = currentProduct.colors[idx];
  document.getElementById("colorSelectedLabel").textContent = "— " + selectedColor.name;
  checkAddBtn();
}

function selectSize(s, el) {
  selectedSize = s;
  document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("selected"));
  el.classList.add("selected");
  checkAddBtn();
}

function checkAddBtn() {
  const needsColor = currentProduct.colors && currentProduct.colors.length > 0;
  const colorOk = !needsColor || selectedColor;
  const sizeOk = !!selectedSize;

  document.getElementById("addBtn").disabled = !(colorOk && sizeOk);

  // Hint message
  let hint = "";
  if (!colorOk && !sizeOk) hint = "Selecione cor e tamanho";
  else if (!colorOk) hint = "Selecione uma cor";
  else if (!sizeOk) hint = "Selecione um tamanho";
  document.getElementById("validationHint").textContent = hint;
}

function changeQty(d) {
  qty = Math.max(1, qty + d);
  document.getElementById("qtyVal").textContent = qty;
}

function addToCart() {
  const needsColor = currentProduct.colors && currentProduct.colors.length > 0;
  if (needsColor && !selectedColor) return;
  if (!selectedSize) return;

  const colorKey = selectedColor ? selectedColor.name : "Padrão";
  const existing = cart.find(i => i.id === currentProduct.id && i.size === selectedSize && i.colorName === colorKey);
  if (existing) {
    existing.qty += qty;
  } else {
    cart.push({
      ...currentProduct,
      size: selectedSize,
      colorName: colorKey,
      colorHex: selectedColor ? selectedColor.hex : null,
      qty
    });
  }
  updateCartCount();
  document.getElementById("productOverlay").classList.remove("open");
  showToast("✓ Adicionado à sacola!");
}

function updateCartCount() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById("cartCount").textContent = total;
}

function openCart() {
  renderCart();
  document.getElementById("cartOverlay").classList.add("open");
}

function closeCart() {
  document.getElementById("cartOverlay").classList.remove("open");
}

function renderCart() {
  const el = document.getElementById("cartItems");
  const footer = document.getElementById("cartFooter");
  if (cart.length === 0) {
    el.innerHTML = `<div class="cart-empty"><span>🛍️</span>Sua sacola está vazia.<br>Adicione peças para pedir!</div>`;
    footer.style.display = "none";
    return;
  }
  footer.style.display = "block";
  el.innerHTML = cart.map((item, idx) => {
    const dotStyle = item.colorHex ? `style="${swatchStyle(item.colorHex)}"` : '';
    return `
    <div class="cart-item">
      <div class="cart-item-img">${imgTag(item.img, item.emoji, item.name)}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-meta">
          ${item.colorHex ? `<span class="cart-item-color-dot" ${dotStyle}></span>` : ""}
          <span>${item.colorName}</span>
          <span>·</span>
          <span>Tam. ${item.size}</span>
          <span>·</span>
          <span>Qtd: ${item.qty}</span>
        </div>
        <div class="cart-item-price">${formatPrice(item.price * item.qty)}</div>
      </div>
      <button class="cart-item-remove" onclick="removeItem(${idx})">🗑️</button>
    </div>`;
  }).join("");

  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById("cartTotal").textContent = formatPrice(total);
}

function removeItem(idx) {
  cart.splice(idx, 1);
  updateCartCount();
  renderCart();
}

function sendOrder() {
  const name = document.getElementById("clientName").value.trim();
  const phone = document.getElementById("clientPhone").value.trim();
  const obs = document.getElementById("clientObs").value.trim();
  if (!name) { alert("Por favor, informe seu nome."); return; }
  if (!phone) { alert("Por favor, informe seu WhatsApp."); return; }
  if (cart.length === 0) return;

  let msg = `🛍️ *NOVO PEDIDO*\n\n`;
  msg += `👤 *Cliente:* ${name}\n`;
  msg += `📱 *WhatsApp:* ${phone}\n\n`;
  msg += `*Itens do pedido:*\n`;
  msg += `─────────────────\n`;

  cart.forEach(item => {
    msg += `• ${item.name}\n  Cor: ${item.colorName} | Tam: ${item.size} | Qtd: ${item.qty} | ${formatPrice(item.price * item.qty)}\n`;
  });

  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  msg += `─────────────────\n`;
  msg += `💰 *Total: ${formatPrice(total)}*\n`;
  if (obs) msg += `\n📝 *Obs:* ${obs}`;

  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  window.open(url, "_blank");
}

function handleOverlayClick(e, id) {
  if (e.target.id === id) document.getElementById(id).classList.remove("open");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

renderGrid("all");
</script>
